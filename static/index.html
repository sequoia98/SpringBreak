<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpringBreak</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>SpringBreak</h1><br>
    <p>Jailbreaking...</p>

    <script>
        //Chromebar
        function update() {
            var chromebar = {
                "appId": "com.lab126.fts",
                "topNavBar": {
                    "template": "title",
                    "title": "SpringBreak",
                    "buttons": [
                        {
                            "id": "KPP_CLOSE",
                            "state": "enabled",
                            "handling": "system"
                        }
                    ],
                }
            };

            window.kindle.messaging.sendMessage("com.lab126.chromebar", "configureChrome", chromebar);
        };

        update();
        window.kindle.appmgr.ongo = function () { update(); };

        //Message
        window.kindle.messaging.sendStringMessage("com.lab126.winmgr", "vibrancyMode", "x");
        window.kindle.appmgr.start("com.lab126.booklet.home");
    </script>
</body>
</html>
